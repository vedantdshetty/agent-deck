<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1b26" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Agent Deck" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/static/icons/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/icons/logo.svg" />
    <title>Agent Deck</title>

    <!-- 1. Theme init (synchronous, prevents flash of wrong theme) -->
    <script>
      ;(function() {
        var t = localStorage.getItem('theme')
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <!-- 2. Tailwind Play CDN (vendored, no external requests) -->
    <script src="/static/vendor/tailwind.js"></script>


    <!-- 3. Tailwind config: Tokyo Night palette + dark mode via selector -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            },
            fontSize: {
              'xs': '12px',
              'sm': '14px',
              'base': '14px',
              'lg': '16px',
              'xl': '20px',
              '2xl': '24px',
            },
            spacing: {
              'sp-4': '4px',
              'sp-8': '8px',
              'sp-12': '12px',
              'sp-16': '16px',
              'sp-24': '24px',
              'sp-32': '32px',
            },
            colors: {
              'tn-bg':     '#1a1b26',
              'tn-panel':  '#16161e',
              'tn-fg':     '#a9b1d6',
              'tn-muted':  '#787c99',
              'tn-blue':   '#7aa2f7',
              'tn-green':  '#73daca',
              'tn-red':    '#f7768e',
              'tn-yellow': '#e0af68',
              'tn-purple': '#bb9af7',
              'tn-card':   '#24283b',
              'tn-light-bg':    '#e6e7ed',
              'tn-light-panel': '#d6d8df',
              'tn-light-fg':    '#363c4d',
              'tn-light-blue':  '#2959aa',
            }
          }
        }
      }
    </script>

    <!-- 3b. Chart.js UMD (sets window.Chart, must load before ES modules) -->
    <script src="/static/chart.umd.min.js"></script>

    <!-- 4. Import map: single Preact instance via bare specifiers -->
    <script type="importmap">
    {
      "imports": {
        "preact":          "/static/vendor/preact.mjs",
        "preact/hooks":    "/static/vendor/preact-hooks.mjs",
        "htm/preact":      "/static/vendor/htm.mjs",
        "@preact/signals": "/static/vendor/signals.mjs",
        "@xterm/xterm":       "/static/vendor/xterm.mjs",
        "@xterm/addon-fit":   "/static/vendor/addon-fit.mjs",
        "@xterm/addon-webgl": "/static/vendor/addon-webgl.mjs"
      }
    }
    </script>

    <!-- 5. Preact app entry (module, deferred by default) -->
    <script type="module" src="/static/app/main.js"></script>

    <link rel="stylesheet" href="/static/vendor/xterm.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="bg-gray-100 dark:bg-tn-bg text-gray-900 dark:text-tn-fg min-h-screen">
    <!-- Preact app mounts here -->
    <div id="app-root" class="min-h-screen"></div>

    <!-- xterm.js Canvas renderer addon (UMD, loaded by TerminalPanel.js) -->
    <script src="/static/vendor/addon-canvas.js"></script>
  </body>
</html>
